<div class="admin-login-wrapper">
    <!-- Dynamic Glowing Background -->
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>
    <div class="grid-bg"></div>

    <div class="admin-login-container admin-fade-in">
        <div class="brand-header">
            <div class="shield-icon">
                <i class="pi pi-shield"></i>
                <div class="ring"></div>
            </div>
            <h1 class="title">System Admin</h1>
            <p class="subtitle">Secure authentication gateway</p>
        </div>

        <form [formGroup]="LoginForm" (ngSubmit)="onSubmit()" novalidate class="form-container">

            <div class="input-group fade-delay-1">
                <label for="username">Administrator ID</label>
                <div class="input-wrapper">
                    <i class="pi pi-user input-icon"></i>
                    <input id="username" type="text" formControlName="userName" placeholder="Enter your clearance ID"
                        autocomplete="off" />
                    <div class="input-border"></div>
                </div>
            </div>

            <div class="input-group fade-delay-2">
                <label for="password">Security Protocol</label>
                <div class="input-wrapper">
                    <i class="pi pi-lock input-icon"></i>
                    <input id="password" [type]="showPassword ? 'text' : 'password'" formControlName="password"
                        placeholder="Enter security key" />
                    <button type="button" class="eye-btn" (click)="showPassword = !showPassword" tabindex="-1">
                        <i [class]="showPassword ? 'pi pi-eye-slash' : 'pi pi-eye'"></i>
                    </button>
                    <div class="input-border"></div>
                </div>
            </div>

            <div class="action-section fade-delay-3">
                <button type="submit" [disabled]="LoginForm.invalid || submitted" class="auth-btn">
                    <span class="btn-text" *ngIf="!submitted">Initialize Session</span>
                    <span class="btn-text" *ngIf="submitted">Authenticating...</span>
                    <i *ngIf="!submitted" class="pi pi-arrow-right btn-icon"></i>
                    <i *ngIf="submitted" class="pi pi-spinner pi-spin btn-icon"></i>
                </button>
            </div>

            <!-- Messages -->
            <div *ngIf="successMessage" class="status-msg success admin-fade-in">
                <i class="pi pi-check-circle"></i> {{ successMessage }}
            </div>
            <div *ngIf="errorMessage" class="status-msg error admin-fade-in">
                <i class="pi pi-exclamation-triangle"></i> {{ errorMessage }}
            </div>

        </form>
    </div>
</div>
